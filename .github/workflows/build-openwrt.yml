name: Build OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

permissions:
  actions: write
  contents: write

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT "$PWD"
        git clone "$REPO_URL" -b "$REPO_BRANCH" openwrt
        ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"

    - name: Load custom feeds
      run: |
        [ -e "$FEEDS_CONF" ] && mv "$FEEDS_CONF" openwrt/feeds.conf.default
        chmod +x "$DIY_P1_SH"
        cd openwrt
        "$GITHUB_WORKSPACE/$DIY_P1_SH"

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e "$CONFIG_FILE" ] && mv "$CONFIG_FILE" openwrt/.config
        chmod +x "$DIY_P2_SH"
        cd openwrt
        "$GITHUB_WORKSPACE/$DIY_P2_SH"

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        # 编译成功后立即校验固件目录，避免后续整理步骤在通配符 cd 处报错而丢失真实原因。
        if ! find bin/targets -mindepth 2 -maxdepth 2 -type d -print -quit 2>/dev/null | grep -q .; then
          echo "::error::未找到固件输出目录 bin/targets/*/*，请检查 .config 是否启用了目标设备和镜像输出。"
          find bin -maxdepth 4 -type d -print 2>/dev/null || true
          exit 1
        fi
        echo "status=success" >> "$GITHUB_OUTPUT"
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> "$GITHUB_ENV"
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> "$GITHUB_ENV"

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        TARGET_DIRS=()
        while IFS= read -r -d '' target_dir; do
          TARGET_DIRS+=("$target_dir")
        done < <(find openwrt/bin/targets -mindepth 2 -maxdepth 2 -type d -print0 2>/dev/null)

        if [ ${#TARGET_DIRS[@]} -eq 0 ]; then
          echo "::error::未找到固件输出目录 openwrt/bin/targets/*/*，无法整理上传文件。"
          find openwrt/bin -maxdepth 4 -type d -print 2>/dev/null || true
          exit 1
        fi

        FIRMWARE_DIR="$GITHUB_WORKSPACE/bin_firmware"
        mkdir -p "$FIRMWARE_DIR"
        for target_dir in "${TARGET_DIRS[@]}"; do
          rm -rf "$target_dir/packages"
          find "$target_dir" -maxdepth 1 -type f -exec cp -f {} "$FIRMWARE_DIR"/ \;
        done

        if ! find "$FIRMWARE_DIR" -maxdepth 1 -type f -print -quit | grep -q .; then
          echo "::error::固件输出目录存在，但没有可上传的固件文件。"
          printf '%s\n' "${TARGET_DIRS[@]}"
          exit 1
        fi

        # 使用步骤输出传递固件目录，避免 release 上传时空变量被解析成根目录通配符 /*
        echo "firmware_dir=$FIRMWARE_DIR" >> "$GITHUB_OUTPUT"
        echo "status=success" >> "$GITHUB_OUTPUT"

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ steps.organize.outputs.firmware_dir }}

    - name: Upload firmware to cowtransfer
      id: cowtransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_COWTRANSFER == 'true' && !cancelled()
      run: |
        curl -fsSL https://raw.githubusercontent.com/Mikubill/transfer/master/install.sh | sh
        ./transfer cow --block 2621440 -s -p 64 --no-progress "${{ steps.organize.outputs.firmware_dir }}" 2>&1 | tee cowtransfer.log
        echo "::warning file=cowtransfer.com::$(cat cowtransfer.log | grep https)"
        echo "url=$(cat cowtransfer.log | grep https | cut -f3 -d" ")" >> "$GITHUB_OUTPUT"

    - name: Upload firmware to WeTransfer
      id: wetransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_WETRANSFER == 'true' && !cancelled()
      run: |
        curl -fsSL https://raw.githubusercontent.com/Mikubill/transfer/master/install.sh | sh
        ./transfer wet -s -p 16 --no-progress "${{ steps.organize.outputs.firmware_dir }}" 2>&1 | tee wetransfer.log
        echo "::warning file=wetransfer.com::$(cat wetransfer.log | grep https)"
        echo "url=$(cat wetransfer.log | grep https | cut -f3 -d" ")" >> "$GITHUB_OUTPUT"

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> "$GITHUB_OUTPUT"
        touch release.txt
        if [ "$UPLOAD_COWTRANSFER" = true ]; then
          echo "🔗 [Cowtransfer](${{ steps.cowtransfer.outputs.url }})" >> release.txt
        fi
        if [ "$UPLOAD_WETRANSFER" = true ]; then
          echo "🔗 [WeTransfer](${{ steps.wetransfer.outputs.url }})" >> release.txt
        fi
        echo "status=success" >> "$GITHUB_OUTPUT"

    - name: Upload firmware to release
      if: steps.organize.outputs.status == 'success' && steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 使用 GitHub CLI 发布，减少第三方 action 的 Node 运行时兼容风险。
        gh release create "${{ steps.tag.outputs.release_tag }}" \
          "${{ steps.organize.outputs.firmware_dir }}"/* \
          --title "${{ steps.tag.outputs.release_tag }}" \
          --notes-file release.txt

    - name: Delete workflow runs
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 保留最新的 3 条运行记录，并清理 1 天前的已完成记录，避免依赖过旧的第三方 action。
        keep_minimum_runs=3
        retain_days=1
        cutoff="$(date -u -d "${retain_days} days ago" +%s)"
        kept_runs=0

        gh api "repos/${GITHUB_REPOSITORY}/actions/runs" --paginate \
          --jq '.workflow_runs[] | select(.status == "completed") | [.id, .created_at] | @tsv' |
        while IFS=$'\t' read -r run_id created_at; do
          kept_runs=$((kept_runs + 1))
          [ "$kept_runs" -le "$keep_minimum_runs" ] && continue

          created_at_seconds="$(date -u -d "$created_at" +%s)"
          if [ "$created_at_seconds" -lt "$cutoff" ]; then
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}"
          fi
        done

    - name: Remove old Releases
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 仅保留最新 3 个 release，并同步删除对应 tag。
        gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
          --jq 'sort_by(.created_at) | reverse | .[3:][] | select(.draft | not) | .tag_name' |
        while IFS= read -r release_tag; do
          [ -z "$release_tag" ] && continue
          gh release delete "$release_tag" --cleanup-tag -y
        done
