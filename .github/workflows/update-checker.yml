name: Update Checker

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master

on:
  workflow_dispatch:
#  schedule:
#    - cron: 0 */18 * * *

permissions:
  actions: write
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:

    - name: Get Commit Hash
      id: getHash
      run: |
        git clone --depth 1 "$REPO_URL" -b "$REPO_BRANCH" .
        echo "commitHash=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    - name: Compare Commit Hash
      id: cacheHash
      uses: actions/cache@v4
      with:
        path: .commitHash
        key: HEAD-${{ steps.getHash.outputs.commitHash }}

    - name: Save New Commit Hash
      if: steps.cacheHash.outputs.cache-hit != 'true'
      run: |
        echo "${{ steps.getHash.outputs.commitHash }}" | tee .commitHash

    - name: Trigger build
      if: steps.cacheHash.outputs.cache-hit != 'true'
      env:
        GH_TOKEN: ${{ secrets.ACTIONS_TRIGGER_PAT || secrets.GITHUB_TOKEN }}
      run: |
        # 使用 GitHub CLI 触发 repository_dispatch，缺省可直接使用仓库内置 GITHUB_TOKEN。
        gh api "repos/${GITHUB_REPOSITORY}/dispatches" \
          -f event_type='Source Code Update'

    - name: Delete workflow runs
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 保留最新的 1 条运行记录，并清理 1 天前的已完成记录。
        keep_minimum_runs=1
        retain_days=1
        cutoff="$(date -u -d "${retain_days} days ago" +%s)"
        kept_runs=0

        gh api "repos/${GITHUB_REPOSITORY}/actions/runs" --paginate \
          --jq '.workflow_runs[] | select(.status == "completed") | [.id, .created_at] | @tsv' |
        while IFS=$'\t' read -r run_id created_at; do
          kept_runs=$((kept_runs + 1))
          [ "$kept_runs" -le "$keep_minimum_runs" ] && continue

          created_at_seconds="$(date -u -d "$created_at" +%s)"
          if [ "$created_at_seconds" -lt "$cutoff" ]; then
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}"
          fi
        done
